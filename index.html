<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map & Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body, html {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc; /* light slate */
            transition: background-color 0.3s;
        }
        
        body.dark, html.dark {
            background-color: #18181b; /* zinc 900 */
        }

        .board-bg {
            background-image: 
                linear-gradient(to right, rgba(148, 163, 184, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        .dark .board-bg {
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        .card {
            position: absolute;
            width: 280px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.2s, transform 0.1s;
        }
        
        .dark .card { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); }
        .card.dragging { box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15); transform: scale(1.02); z-index: 100 !important; opacity: 0.95; }
        .dark .card.dragging { box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5); }
        .card-header { cursor: grab; }
        .card-header:active { cursor: grabbing; }

        .connect-handle { cursor: crosshair; transition: all 0.2s; }
        .connect-handle:hover { transform: scale(1.3); }

        .task-completed { opacity: 0.5; text-decoration: line-through; }

        .title-input {
            background: transparent; border: none; outline: none; color: inherit;
            font-weight: inherit; width: 100%; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
        }
        .title-input:focus { background: rgba(255,255,255,0.4); border-radius: 4px; }
        .dark .title-input:focus { background: rgba(0,0,0,0.2); }

        .is-panning, .is-panning * { cursor: grabbing !important; }
        #board-container { touch-action: none; }
        
        /* Custom scrollbar for textareas */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #52525b; }
    </style>
</head>
<body class="text-slate-700 dark:text-gray-300 selection:bg-emerald-400 selection:text-white relative transition-colors duration-300">

    <!-- UI Controls (Right side, Tools + Zoom) -->
    <div class="fixed bottom-6 right-6 z-50 pointer-events-auto">
        
        <div class="flex flex-col gap-1 items-center bg-white/80 dark:bg-zinc-800/80 backdrop-blur-sm shadow-md border border-slate-200 dark:border-zinc-700 rounded-full p-2 relative">
            
            <!-- Settings Panel (Floating above) -->
            <div id="settings-panel" class="absolute bottom-full mb-4 right-0 flex flex-col gap-2 bg-white/95 dark:bg-zinc-800/95 backdrop-blur-md p-3 rounded-2xl shadow-xl border border-slate-200 dark:border-zinc-700 transition-all duration-200 opacity-0 scale-95 origin-bottom-right pointer-events-none">
                <div class="text-[10px] font-bold text-slate-400 dark:text-zinc-500 mb-1 px-1 tracking-wider uppercase text-center">Settings</div>
                
                <!-- Data Export/Import -->
                <div class="flex gap-2">
                    <label class="w-10 h-10 bg-slate-100 dark:bg-zinc-700 hover:bg-slate-200 dark:hover:bg-zinc-600 rounded-full flex items-center justify-center text-slate-600 dark:text-gray-300 hover:text-emerald-500 cursor-pointer transition-colors" title="Import Data">
                        <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </label>
                    <button onclick="exportData()" class="w-10 h-10 bg-slate-100 dark:bg-zinc-700 hover:bg-slate-200 dark:hover:bg-zinc-600 rounded-full flex items-center justify-center text-slate-600 dark:text-gray-300 hover:text-emerald-500 transition-colors" title="Export Data">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </button>
                </div>
                
                <div class="h-px bg-slate-200 dark:bg-zinc-700 w-full my-1"></div>
                
                <!-- Snap to Grid & Dark Mode -->
                <div class="flex gap-2">
                    <button id="snap-btn" onclick="toggleSnapToGrid()" class="w-10 h-10 bg-slate-100 dark:bg-zinc-700 hover:bg-slate-200 dark:hover:bg-zinc-600 rounded-full flex items-center justify-center text-slate-500 dark:text-gray-400 transition-colors" title="Toggle Snap to Grid">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    </button>
                    <button onclick="toggleDarkMode()" class="w-10 h-10 bg-slate-100 dark:bg-zinc-700 hover:bg-slate-200 dark:hover:bg-zinc-600 rounded-full flex items-center justify-center text-slate-500 dark:text-gray-400 transition-colors" title="Toggle Dark Mode">
                        <svg id="icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Settings Toggle Button -->
            <button onclick="toggleSettings()" id="settings-toggle-btn" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-gray-400 hover:text-emerald-500 hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors" title="Settings">
                <svg class="w-5 h-5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            </button>

            <div class="h-px bg-slate-300 dark:bg-zinc-700 w-full my-1"></div>

            <!-- Zoom Controls -->
            <button onclick="changeZoom(0.1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-gray-400 hover:text-emerald-500 hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors" title="Zoom In">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            </button>
            <button id="zoom-display" onclick="resetZoom()" class="w-10 h-8 flex items-center justify-center text-slate-500 dark:text-gray-400 hover:text-emerald-500 transition-colors font-semibold text-xs" title="Reset Zoom">
                100%
            </button>
            <button onclick="changeZoom(-0.1)" class="w-10 h-10 rounded-full flex items-center justify-center text-slate-500 dark:text-gray-400 hover:text-emerald-500 hover:bg-slate-100 dark:hover:bg-zinc-700 transition-colors" title="Zoom Out">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 12H6"></path></svg>
            </button>
        </div>
    </div>

    <!-- The Pan/Zoom Board Area -->
    <div id="board-container" class="w-full h-full board-bg relative overflow-hidden" ondblclick="handleBoardDoubleClick(event)">
        <div id="zoom-layer" class="absolute inset-0 w-full h-full origin-top-left pointer-events-none" style="transform: translate(0px, 0px) scale(1);">
            <svg id="lines-layer" class="absolute pointer-events-none z-0" style="overflow: visible; width: 1px; height: 1px;"></svg>
            <div id="cards-container" class="absolute z-10 pointer-events-none" style="width: 1px; height: 1px; overflow: visible;"></div>
        </div>
    </div>

    <script>
        // --- Settings & Maps ---
        const STORAGE_KEY = 'mind_map_planner_v5'; 
        
        // General Color Palette
        const colorMap = {
            'theme-mint': { bg: 'bg-emerald-100/60 dark:bg-emerald-900/30', border: 'border-emerald-300 dark:border-emerald-700/50', handle: 'bg-emerald-500', hex: '#34d399', check: 'text-emerald-600 dark:text-emerald-400' },
            'theme-sand': { bg: 'bg-amber-100/60 dark:bg-amber-900/30', border: 'border-amber-300 dark:border-amber-700/50', handle: 'bg-amber-500', hex: '#fbbf24', check: 'text-amber-600 dark:text-amber-400' },
            'theme-slate': { bg: 'bg-slate-200/60 dark:bg-slate-800/50', border: 'border-slate-300 dark:border-slate-600/50', handle: 'bg-slate-500', hex: '#94a3b8', check: 'text-slate-600 dark:text-slate-400' },
            'theme-sky': { bg: 'bg-sky-100/60 dark:bg-sky-900/30', border: 'border-sky-300 dark:border-sky-700/50', handle: 'bg-sky-500', hex: '#38bdf8', check: 'text-sky-600 dark:text-sky-400' },
            'theme-coral': { bg: 'bg-rose-100/60 dark:bg-rose-900/30', border: 'border-rose-300 dark:border-rose-700/50', handle: 'bg-rose-500', hex: '#fb7185', check: 'text-rose-600 dark:text-rose-400' },
            'theme-lavender': { bg: 'bg-violet-100/60 dark:bg-violet-900/30', border: 'border-violet-300 dark:border-violet-700/50', handle: 'bg-violet-500', hex: '#a78bfa', check: 'text-violet-600 dark:text-violet-400' }
        };

        // --- State Management ---
        let boards = [];
        let activeBoardId = null;
        let isDarkMode = false;
        let isSnapToGrid = false;

        // Active references
        let cards = [];
        let connections = [];

        function loadData() {
            isDarkMode = localStorage.getItem('mm_dark_mode') === 'true';
            updateDarkMode();
            isSnapToGrid = localStorage.getItem('mm_snap_grid') === 'true';
            updateSnapUI();

            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    boards = data.boards || [];
                    activeBoardId = data.activeBoardId;
                } catch (e) { console.error("Could not parse data", e); }
            }

            if (boards.length === 0) {
                const defaultBoardId = generateId();
                boards.push({ id: defaultBoardId, name: 'Main Workspace', cards: [], connections: [] });
                activeBoardId = defaultBoardId;
            }

            // Ensure active board exists
            if (!boards.find(b => b.id === activeBoardId)) {
                activeBoardId = boards[0].id;
            }

            syncActiveBoard();
        }

        function syncActiveBoard() {
            const board = boards.find(b => b.id === activeBoardId);
            cards = board.cards;
            connections = board.connections;
            renderBoard();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ boards, activeBoardId }));
        }

        // --- Export & Import ---
        function exportData() {
            const dataStr = JSON.stringify({ boards, activeBoardId }, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `mind_map_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.boards && Array.isArray(data.boards)) {
                        boards = data.boards;
                        activeBoardId = data.activeBoardId || boards[0].id;
                        syncActiveBoard();
                        saveData();
                        alert("Data imported successfully!");
                    } else {
                        alert("Invalid file format.");
                    }
                } catch(err) { alert("Could not read backup file."); }
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset input
        }

        // --- Dark Mode & Grid Logic ---
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('mm_dark_mode', isDarkMode);
            updateDarkMode();
        }

        function updateDarkMode() {
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                document.getElementById('icon-sun').classList.remove('hidden');
                document.getElementById('icon-moon').classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('icon-moon').classList.remove('hidden');
                document.getElementById('icon-sun').classList.add('hidden');
            }
            renderLines(); 
        }

        function toggleSnapToGrid() {
            isSnapToGrid = !isSnapToGrid;
            localStorage.setItem('mm_snap_grid', isSnapToGrid);
            updateSnapUI();
        }

        function updateSnapUI() {
            const btn = document.getElementById('snap-btn');
            if (isSnapToGrid) {
                btn.classList.add('text-emerald-500', 'dark:text-emerald-400');
                btn.classList.remove('text-slate-500', 'dark:text-gray-400');
            } else {
                btn.classList.remove('text-emerald-500', 'dark:text-emerald-400');
                btn.classList.add('text-slate-500', 'dark:text-gray-400');
            }
            if (isSnapToGrid && cards.length > 0) {
                cards.forEach(card => {
                    card.x = Math.round(card.x / 40) * 40;
                    card.y = Math.round(card.y / 40) * 40;
                });
                saveData();
                renderBoard();
            }
        }

        // --- Interaction State ---
        let isDraggingCard = false; let dragCardId = null; let dragOffsetX = 0; let dragOffsetY = 0;
        let isDrawingLine = false; let lineStartCardId = null; let mouseX = 0; let mouseY = 0;
        let activeColorPickerId = null; let highestZIndex = 10;
        let lastTap = 0; let initialPinchDistance = null; let initialZoomScale = 1;
        let zoom = 1; const MIN_ZOOM = 0.15; const MAX_ZOOM = 3;
        let panX = 0; let panY = 0; let isPanningBoard = false;

        const cardsContainer = document.getElementById('cards-container');
        const linesLayer = document.getElementById('lines-layer');
        const zoomLayer = document.getElementById('zoom-layer');
        const boardContainer = document.getElementById('board-container');

        // --- Utility ---
        function getClientPos(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            else if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }
        function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9); }
        function getCardCenter(cardData) {
            const el = document.getElementById(cardData.id);
            if (el) return { x: cardData.x + 140, y: cardData.y + (el.offsetHeight / 2) }; // 280px width
            return { x: cardData.x + 140, y: cardData.y + 50 }; 
        }
        function escapeHTML(str) {
            return str ? str.replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag])) : '';
        }
        function autoResizeText(input) {
            if (!input) return;
            input.style.fontSize = '14px'; 
            let size = 14;
            while (input.scrollWidth > input.clientWidth && size > 9) {
                size -= 0.5; input.style.fontSize = size + 'px';
            }
        }

        // --- Rendering ---
        function getHiddenCardIds() {
            let hiddenIds = new Set();
            function hideChildren(parentId) {
                connections.forEach(conn => {
                    if (conn.from === parentId) { hiddenIds.add(conn.to); hideChildren(conn.to); }
                });
            }
            cards.forEach(card => { if (card.collapsed) hideChildren(card.id); });
            return hiddenIds;
        }

        function renderBoard() {
            cardsContainer.innerHTML = '';
            const hiddenCardIds = getHiddenCardIds();
            
            cards.forEach(card => {
                if (hiddenCardIds.has(card.id)) return;

                const cardEl = document.createElement('div');
                cardEl.id = card.id;
                cardEl.className = `card bg-white dark:bg-zinc-800 rounded-2xl border border-slate-200 dark:border-zinc-700 flex flex-col overflow-hidden pointer-events-auto transition-colors ${card.done ? 'opacity-60 grayscale-[0.5]' : ''}`;
                cardEl.style.left = `${card.x}px`; cardEl.style.top = `${card.y}px`;
                cardEl.style.zIndex = activeColorPickerId === card.id ? highestZIndex + 50 : highestZIndex;

                const theme = colorMap[card.color] || colorMap['theme-slate'];
                
                // Progress Calculation
                const childIds = connections.filter(c => c.from === card.id).map(c => c.to);
                const children = childIds.map(id => cards.find(c => c.id === id)).filter(Boolean);
                let progressHTML = '';
                if (children.length > 0) {
                    const doneCount = children.filter(c => c.done).length;
                    const percent = doneCount / children.length;
                    const dashoffset = 50 - (50 * percent);
                    progressHTML = `
                        <svg class="w-5 h-5 -rotate-90 ml-1 flex-shrink-0" title="${doneCount}/${children.length} sub-tasks complete">
                            <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="2.5" class="text-slate-200 dark:text-zinc-600" />
                            <circle cx="10" cy="10" r="8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-dasharray="50" stroke-dashoffset="${dashoffset}" class="${theme.check} transition-all duration-500" />
                        </svg>
                    `;
                }

                const collapseBtnHTML = children.length > 0 ? `
                    <button onclick="toggleCollapse(event, '${card.id}')" ontouchstart="toggleCollapse(event, '${card.id}')" class="text-slate-400 hover:text-slate-700 dark:hover:text-gray-200 transition-colors p-1 rounded hover:bg-white/50 dark:hover:bg-zinc-700/50">
                        ${card.collapsed ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>' : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>'}
                    </button>
                ` : '';

                const colorPickerHTML = activeColorPickerId === card.id ? `
                    <div class="absolute top-full right-0 mt-2 p-2 bg-white dark:bg-zinc-800 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.1)] border border-slate-200 dark:border-zinc-700 flex flex-wrap gap-1.5 w-[100px] z-50 cursor-default" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        ${Object.keys(colorMap).map(k => `<button onclick="changeCardColor(event, '${card.id}', '${k}')" ontouchstart="changeCardColor(event, '${card.id}', '${k}')" class="w-6 h-6 rounded-full border-2 ${card.color === k ? 'border-slate-800 dark:border-gray-200' : 'border-transparent'} hover:scale-110 transition-transform shadow-sm" style="background-color: ${colorMap[k].hex}"></button>`).join('')}
                    </div>
                ` : '';

                let notesHTML = card.showNotes ? `
                    <div class="px-3 pb-2 pt-1 border-b border-slate-100 dark:border-zinc-700">
                        <textarea class="w-full text-xs p-2 bg-slate-50 dark:bg-zinc-900 border border-slate-200 dark:border-zinc-700 rounded-lg resize-y outline-none text-slate-700 dark:text-gray-300" rows="3" placeholder="Add details..." onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" oninput="updateNotes('${card.id}', this.value)">${escapeHTML(card.notes || '')}</textarea>
                    </div>` : '';

                cardEl.innerHTML = `
                    <div class="card-header ${theme.bg} border-b ${theme.border} p-3 flex items-center justify-between gap-2" onmousedown="startDrag(event, '${card.id}')" ontouchstart="startDrag(event, '${card.id}')">
                        
                        <button onclick="toggleCardDone(event, '${card.id}')" ontouchstart="toggleCardDone(event, '${card.id}')" class="mt-0.5 flex-shrink-0 w-4 h-4 rounded border ${card.done ? `${theme.handle} border-transparent text-white` : 'border-slate-300 dark:border-zinc-500 bg-white dark:bg-zinc-800'} flex items-center justify-center transition-colors shadow-sm">
                            ${card.done ? `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>` : ''}
                        </button>
                        
                        <input type="text" class="title-input text-sm font-semibold text-slate-800 dark:text-gray-100 ${card.done ? 'task-completed' : ''}" value="${escapeHTML(card.title)}" oninput="autoResizeText(this)" onchange="updateCardTitle('${card.id}', this.value)" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        ${progressHTML}

                        <div class="flex items-center gap-0.5 color-picker-container relative">
                            ${collapseBtnHTML}
                            <button onclick="toggleColorPicker(event, '${card.id}')" ontouchstart="toggleColorPicker(event, '${card.id}')" class="text-slate-400 hover:text-slate-700 dark:hover:text-gray-200 transition-colors p-1 rounded hover:bg-white/50 dark:hover:bg-zinc-700/50" title="Change Theme">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>
                            </button>
                            ${colorPickerHTML}
                        </div>
                    </div>

                    <!-- Toolbar -->
                    <div class="flex items-center gap-1 px-2 py-1 bg-slate-50/50 dark:bg-zinc-800/30 border-b border-slate-100 dark:border-zinc-700/50" onmousedown="event.stopPropagation()">
                        <button onclick="toggleNotes('${card.id}')" class="text-[11px] px-2 py-1 text-slate-500 hover:text-slate-800 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-slate-200 dark:hover:bg-zinc-700 rounded transition-colors ${card.showNotes ? 'bg-slate-200 dark:bg-zinc-700 text-slate-800 dark:text-gray-200' : ''}" title="Toggle Notes">📝 Notes</button>
                        <div class="flex-1"></div>
                        <button onclick="deleteCard('${card.id}')" class="text-slate-400 hover:text-red-400 transition-colors p-1 rounded hover:bg-red-50 dark:hover:bg-red-900/30" title="Delete Card">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>

                    ${notesHTML}

                    <!-- Sub-Card Input -->
                    <div class="p-2.5 bg-white/50 dark:bg-zinc-800/50">
                        <form onsubmit="addSubCard(event, '${card.id}')" class="flex gap-1">
                            <input type="text" placeholder="Add connected task..." class="flex-1 text-xs bg-slate-50 dark:bg-zinc-900/80 border border-slate-200 dark:border-zinc-700 text-slate-800 dark:text-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-emerald-400 transition-colors" required onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                            <button type="submit" class="bg-slate-100 dark:bg-zinc-700 hover:bg-slate-200 dark:hover:bg-zinc-600 text-slate-500 dark:text-gray-300 rounded px-2.5 flex items-center justify-center transition-colors">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </form>
                    </div>

                    <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-white dark:bg-zinc-800 rounded-full flex items-center justify-center shadow-sm border border-slate-200 dark:border-zinc-600">
                        <div class="connect-handle w-2.5 h-2.5 ${theme.handle} rounded-full" onmousedown="startConnecting(event, '${card.id}')" ontouchstart="startConnecting(event, '${card.id}')" title="Drag to connect"></div>
                    </div>
                `;

                cardEl.addEventListener('mouseup', (e) => finishConnecting(e, card.id));
                cardEl.addEventListener('mouseover', () => { if(isDrawingLine) cardEl.classList.add('ring-2', 'ring-emerald-400'); });
                cardEl.addEventListener('mouseout', () => { cardEl.classList.remove('ring-2', 'ring-emerald-400'); });

                cardsContainer.appendChild(cardEl);
                autoResizeText(cardEl.querySelector('.title-input'));
            });

            renderLines(hiddenCardIds);
        }

        function renderLines(hiddenCardIds = getHiddenCardIds()) {
            let svgHTML = '';
            const lineStroke = isDarkMode ? '#52525b' : '#cbd5e1'; 

            connections.forEach((conn, index) => {
                if (hiddenCardIds.has(conn.from) || hiddenCardIds.has(conn.to)) return;
                const fromCard = cards.find(c => c.id === conn.from);
                const toCard = cards.find(c => c.id === conn.to);
                
                if (fromCard && toCard) {
                    const start = getCardCenter(fromCard);
                    const end = getCardCenter(toCard);
                    svgHTML += `
                        <g class="group cursor-pointer pointer-events-auto" onclick="deleteConnection(${index})">
                            <line x1="${start.x}" y1="${start.y}" x2="${end.x}" y2="${end.y}" stroke="transparent" stroke-width="15" />
                            <line x1="${start.x}" y1="${start.y}" x2="${end.x}" y2="${end.y}" stroke="${lineStroke}" stroke-width="3" stroke-dasharray="6 4" class="group-hover:stroke-rose-400 transition-colors" />
                            <circle cx="${end.x}" cy="${end.y}" r="4" fill="${lineStroke}" class="group-hover:fill-rose-400 transition-colors" />
                        </g>
                    `;
                }
            });

            if (isDrawingLine && lineStartCardId && !hiddenCardIds.has(lineStartCardId)) {
                const fromCard = cards.find(c => c.id === lineStartCardId);
                if (fromCard) {
                    const start = getCardCenter(fromCard);
                    svgHTML += `
                        <line x1="${start.x}" y1="${start.y}" x2="${mouseX}" y2="${mouseY}" stroke="#34d399" stroke-width="3" stroke-dasharray="4 4" />
                        <circle cx="${mouseX}" cy="${mouseY}" r="4" fill="#34d399" />
                    `;
                }
            }
            linesLayer.innerHTML = svgHTML;
        }

        // --- Extensibility Features ---
        function toggleNotes(cardId) {
            const card = cards.find(c => c.id === cardId);
            if(card) { card.showNotes = !card.showNotes; saveData(); renderBoard(); }
        }
        function updateNotes(cardId, val) {
            const card = cards.find(c => c.id === cardId);
            if(card) { card.notes = val; saveData(); }
        }

        // --- Core Functions ---
        let isSettingsOpen = false;
        function toggleSettings() {
            isSettingsOpen = !isSettingsOpen;
            const panel = document.getElementById('settings-panel');
            const btnIcon = document.querySelector('#settings-toggle-btn svg');
            
            if (isSettingsOpen) {
                panel.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                panel.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
                btnIcon.classList.add('rotate-90');
            } else {
                panel.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
                panel.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
                btnIcon.classList.remove('rotate-90');
            }
        }

        function updateBoardTransform() {
            zoomLayer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
            boardContainer.style.backgroundPosition = `${panX}px ${panY}px`;
            boardContainer.style.backgroundSize = `${40 * zoom}px ${40 * zoom}px`;
            const zd = document.getElementById('zoom-display');
            if(zd) zd.textContent = Math.round(zoom * 100) + '%';
        }

        function changeZoom(delta) { zoomTo(zoom + delta, window.innerWidth / 2, window.innerHeight / 2); }
        function resetZoom() { panX = window.innerWidth/2 - 150; panY = window.innerHeight/2 - 100; zoom = 1; updateBoardTransform(); }
        function zoomTo(newZoom, originX, originY) {
            const clamped = Math.min(Math.max(newZoom, MIN_ZOOM), MAX_ZOOM);
            const canvasX = (originX - panX) / zoom;
            const canvasY = (originY - panY) / zoom;
            panX = originX - canvasX * clamped;
            panY = originY - canvasY * clamped;
            zoom = clamped;
            updateBoardTransform();
        }

        function toggleColorPicker(e, cardId) { e.stopPropagation(); if(e.type==='touchstart') e.preventDefault(); activeColorPickerId = activeColorPickerId === cardId ? null : cardId; renderBoard(); }
        function changeCardColor(e, cardId, color) { e.stopPropagation(); if(e.type==='touchstart') e.preventDefault(); const c = cards.find(x=>x.id===cardId); if (c) { c.color = color; activeColorPickerId = null; saveData(); renderBoard(); } }
        window.addEventListener('mousedown', (e) => { 
            if (activeColorPickerId && !e.target.closest('.color-picker-container')) { 
                activeColorPickerId = null; renderBoard(); 
            } 
            if (isSettingsOpen && !e.target.closest('#settings-panel') && !e.target.closest('#settings-toggle-btn')) {
                toggleSettings();
            }
        });
        window.addEventListener('touchstart', (e) => { 
            if (activeColorPickerId && !e.target.closest('.color-picker-container')) { 
                activeColorPickerId = null; renderBoard(); 
            } 
            if (isSettingsOpen && !e.target.closest('#settings-panel') && !e.target.closest('#settings-toggle-btn')) {
                toggleSettings();
            }
        });

        function handleBoardDoubleClick(e) { if (e.target.id === 'board-container') { addNewCard((e.clientX - panX) / zoom, (e.clientY - panY) / zoom); } }
        
        function addNewCard(x, y) {
            if (isSnapToGrid) { x = Math.round(x / 40) * 40; y = Math.round(y / 40) * 40; }
            const keys = Object.keys(colorMap);
            cards.push({ id: generateId(), x, y, title: 'New Topic', color: keys[Math.floor(Math.random() * keys.length)], done: false, collapsed: false, showNotes: false });
            saveData(); renderBoard();
        }

        function addSubCard(e, parentId) {
            e.preventDefault(); const input = e.target.querySelector('input'); const text = input.value.trim();
            if (text) {
                const parent = cards.find(c => c.id === parentId);
                if (parent) {
                    if(parent.collapsed) parent.collapsed = false;
                    const newId = generateId();
                    const cCount = connections.filter(c => c.from === parentId).length;
                    let newX = parent.x + (cCount * 30) + 20; let newY = parent.y + 110 + (cCount * 20);
                    if (isSnapToGrid) { newX = Math.round(newX/40)*40; newY = Math.round(newY/40)*40; }
                    cards.push({ id: newId, x: newX, y: newY, title: text, color: parent.color, done: false, collapsed: false });
                    connections.push({ from: parentId, to: newId });
                    saveData(); renderBoard();
                }
            }
        }

        function updateCardTitle(id, val) { const c = cards.find(x=>x.id===id); if(c) { c.title = val; saveData(); } }
        function toggleCardDone(e, id) { e.stopPropagation(); if(e.type==='touchstart') e.preventDefault(); const c = cards.find(x=>x.id===id); if(c) { c.done = !c.done; saveData(); renderBoard(); } }
        function toggleCollapse(e, id) { e.stopPropagation(); if(e.type==='touchstart') e.preventDefault(); const c = cards.find(x=>x.id===id); if(c) { c.collapsed = !c.collapsed; saveData(); renderBoard(); } }
        function deleteCard(id) { cards = cards.filter(c => c.id !== id); connections = connections.filter(conn => conn.from !== id && conn.to !== id); saveData(); renderBoard(); }
        function deleteConnection(i) { connections.splice(i, 1); saveData(); renderBoard(); }

        function startDrag(e, id) {
            if(['input','button','textarea'].includes(e.target.tagName.toLowerCase()) || e.target.closest('.color-picker-container')) return;
            if(e.type === 'touchstart') e.preventDefault();
            if(activeColorPickerId) { activeColorPickerId = null; renderBoard(); }
            isDraggingCard = true; dragCardId = id;
            const el = document.getElementById(id);
            highestZIndex++; el.style.zIndex = highestZIndex; el.classList.add('dragging');
            const c = cards.find(x=>x.id===id); const p = getClientPos(e);
            dragOffsetX = ((p.x - panX) / zoom) - c.x; dragOffsetY = ((p.y - panY) / zoom) - c.y;
        }

        function startConnecting(e, id) { e.stopPropagation(); if(e.type==='touchstart') e.preventDefault(); isDrawingLine = true; lineStartCardId = id; const p = getClientPos(e); mouseX = (p.x-panX)/zoom; mouseY = (p.y-panY)/zoom; renderLines(); }
        function finishConnecting(e, targetId) {
            if (isDrawingLine && lineStartCardId && lineStartCardId !== targetId) {
                const ex = connections.find(c => (c.from===lineStartCardId && c.to===targetId) || (c.from===targetId && c.to===lineStartCardId));
                if (!ex) {
                    connections.push({ from: lineStartCardId, to: targetId });
                    const t = cards.find(c=>c.id===targetId); if(t && t.collapsed) t.collapsed = false;
                    const s = cards.find(c=>c.id===lineStartCardId); if(s && s.collapsed) s.collapsed = false;
                    saveData();
                }
            }
        }

        function handlePointerDown(e) {
            if (e.target.id === 'board-container') {
                isPanningBoard = true; document.body.classList.add('is-panning');
                if (e.type === 'touchstart') {
                    const now = Date.now();
                    if (now - lastTap < 300) { const p = getClientPos(e); addNewCard((p.x-panX)/zoom, (p.y-panY)/zoom); isPanningBoard = false; }
                    lastTap = now;
                }
            }
        }

        boardContainer.addEventListener('mousedown', handlePointerDown);
        boardContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) { isPanningBoard = false; initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialZoomScale = zoom; } 
            else if (e.touches.length === 1) handlePointerDown(e);
        }, { passive: false });

        boardContainer.addEventListener('wheel', (e) => { e.preventDefault(); zoomTo(zoom + (e.deltaY * -0.001), e.clientX, e.clientY); }, { passive: false });

        function handlePointerMove(e) {
            const p = getClientPos(e);
            if (isPanningBoard) {
                let mx = e.movementX; let my = e.movementY;
                if (e.type === 'touchmove') { if (!this.lastTouchPos) { this.lastTouchPos = p; return; } mx = p.x - this.lastTouchPos.x; my = p.y - this.lastTouchPos.y; this.lastTouchPos = p; }
                panX += mx || 0; panY += my || 0; updateBoardTransform();
            }
            if (isDraggingCard && dragCardId) {
                const c = cards.find(x=>x.id===dragCardId);
                if (c) {
                    let rx = ((p.x-panX)/zoom)-dragOffsetX; let ry = ((p.y-panY)/zoom)-dragOffsetY;
                    if (isSnapToGrid) { c.x = Math.round(rx/40)*40; c.y = Math.round(ry/40)*40; } else { c.x = rx; c.y = ry; }
                    const el = document.getElementById(dragCardId); if(el) { el.style.left = `${c.x}px`; el.style.top = `${c.y}px`; }
                    renderLines();
                }
            }
            if (isDrawingLine) { mouseX = (p.x-panX)/zoom; mouseY = (p.y-panY)/zoom; renderLines(); }
        }

        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault(); const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                zoomTo(initialZoomScale * (dist / initialPinchDistance), (e.touches[0].clientX + e.touches[1].clientX)/2, (e.touches[0].clientY + e.touches[1].clientY)/2); return;
            }
            if (isPanningBoard || isDraggingCard || isDrawingLine) e.preventDefault();
            handlePointerMove(e);
        }, { passive: false });

        function handlePointerUp(e) {
            this.lastTouchPos = null; initialPinchDistance = null;
            if (isPanningBoard) { isPanningBoard = false; document.body.classList.remove('is-panning'); }
            if (isDraggingCard) {
                if (dragCardId) { const el = document.getElementById(dragCardId); if(el) el.classList.remove('dragging'); saveData(); renderBoard(); } // render to update progress rings if moved over
                isDraggingCard = false; dragCardId = null;
            }
            if (isDrawingLine) {
                if (e.type === 'touchend' || e.type === 'touchcancel') {
                    const p = getClientPos(e); const target = document.elementFromPoint(p.x, p.y);
                    if (target) { const el = target.closest('.card'); if (el && el.id) finishConnecting(e, el.id); }
                }
                setTimeout(() => { isDrawingLine = false; lineStartCardId = null; renderBoard(); document.querySelectorAll('.card').forEach(c => c.classList.remove('ring-2', 'ring-emerald-400')); }, 10);
            }
        }

        window.addEventListener('mouseup', handlePointerUp); window.addEventListener('touchend', handlePointerUp); window.addEventListener('touchcancel', handlePointerUp);
        window.addEventListener('resize', () => { renderLines(); });

        loadData();
        resetZoom();

    </script>
</body>
</html>
